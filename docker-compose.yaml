services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    tty: true
    stdin_open: true
