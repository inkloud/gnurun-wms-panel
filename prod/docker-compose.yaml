services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
    command: fastapi run main.py --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=0
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
    depends_on:
      - backend
    command: npm run serve -- --listen tcp://0.0.0.0:5173
    expose:
      - "5173"
  caddy:
    image: caddy:2.10.2
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
