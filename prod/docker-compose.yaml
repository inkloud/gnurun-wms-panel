services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
    command: fastapi run backend/api/app.py --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=0
    networks:
      - internal-life365-net
      - public
    restart: unless-stopped
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
    depends_on:
      - backend
    command: npm run serve -- --listen tcp://0.0.0.0:5173
    expose:
      - "5173"
    networks:
      - internal-life365-net
    restart: unless-stopped

networks:
  public:
    external: true
  internal-life365-net:
    external: true
